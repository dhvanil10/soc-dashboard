services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: soc_admin
      POSTGRES_PASSWORD: supersecretpassword
      POSTGRES_DB: soc_logs
    ports:
      - "5435:5432"
    volumes:
      - soc_pg_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"  # <--- THIS WAS MISSING!
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  soc_pg_data: